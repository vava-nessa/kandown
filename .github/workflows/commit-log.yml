name: Commit Log to Discord

on:
  push:
    branches: [main, master]

jobs:
  discord:
    runs-on: ubuntu-latest
    steps:
      - name: Extract commit info
        id: info
        run: |
          echo "sha_short=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "msg_first=$(echo '${{ github.event.head_commit.message }}' | head -n1 | sed 's/"/\\"/g')" >> $GITHUB_OUTPUT
          echo "author=${{ github.actor }}" >> $GITHUB_OUTPUT
          echo "repo=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          echo "ref=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          echo "timestamp=${{ github.event.head_commit.timestamp }}" >> $GITHUB_OUTPUT

      - name: Send rich embed to Discord
        run: |
          JSON=$(cat <<EOF
          {
            "embeds": [{
              "title": "[${{ steps.info.outputs.repo }}] ${{ steps.info.outputs.msg_first }}",
              "url": "https://github.com/${{ github.repository }}/commit/${{ github.sha }}",
              "description": "**Commit:** \`${{ steps.info.outputs.sha_short }}\`\n**Author:** \`${{ steps.info.outputs.author }}\`",
              "color": 5814783,
              "author": {
                "name": "${{ github.actor }}",
                "url": "https://github.com/${{ github.actor }}"
              },
              "footer": {
                "text": "${{ steps.info.outputs.repo }} › ${{ steps.info.outputs.ref }}"
              },
              "timestamp": "${{ steps.info.outputs.timestamp }}"
            }]
          }
          EOF)
          curl -s -H "Content-Type: application/json" \
            -d "$JSON" \
            ${{ secrets.DISCORD_WEBHOOK_GITHUB }}
